# Manual publish pipeline for runnerize (tag-driven, never pushes to main).
#
# Triggered on demand (workflow_dispatch). `main` is a protected branch, so this
# workflow deliberately does NOT push a version-bump commit to main. Instead it:
#   1. bumps from npm's latest published version (the source of truth, so an
#      unmerged reconcile PR can never cause a version collision),
#   2. commits the bump on a throwaway `release/vX.Y.Z` branch and tags it,
#   3. publishes to npm FIRST (the only irreversible step), then pushes the tag
#      and that branch (neither is branch-protected) and cuts a GitHub Release,
#   4. opens a reconcile PR so main's package.json version catches up.
#
# Publish-before-push is deliberate: if anything before `npm publish` fails, no
# refs were mutated and a re-run is clean; if a push after publish fails, the
# next run simply re-anchors to the now-published version. There is no stuck,
# non-resumable state.
#
# npm auth uses OIDC TRUSTED PUBLISHING — there is no stored NPM_TOKEN. A
# matching trusted publisher must be configured on npmjs.com for the `runnerize`
# package, bound to THIS workflow file name (publish.yml) for org/repo
# animeshkundu/runnerize. npm >= 11.5.1 supplies the OIDC auth automatically.
#
# Note: the reconcile PR is opened with GITHUB_TOKEN, so CI does not auto-run on
# it (GitHub suppresses workflow triggers on bot-authored events). A repo admin
# merges it directly; the bump is already live on npm regardless of the merge.
name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump for this release
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

# Serialize releases. Two dispatches must never publish concurrently: they could
# both anchor to the same version and the one that finishes last would move npm
# `latest` backward. Queue (do not cancel) so a second run starts only after the
# first completes and then re-anchors to the freshly published version.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Bump & publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Publish only from the default branch, and only when the ref is an actual
    # branch head (a workflow_dispatch can target a tag that shares the branch
    # name; the full-ref check rejects that).
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: write # push the release branch + tag and create the Release
      id-token: write # OIDC trusted publishing + provenance attestation
      pull-requests: write # open the reconcile PR back to main
    steps:
      # Full history + tags so version math and release notes have context.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Zero runtime deps and no committed lockfile. Use a strict `npm ci` when a
      # lockfile exists; otherwise `npm install --no-package-lock`, which keeps a
      # generated lockfile out of the tree so the version-bump commit below does
      # not silently commit one to the repo.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      # Unit gate: a failure here means nothing is bumped, pushed, or published.
      - name: Run unit tests
        run: npm test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump from the LATEST PUBLISHED npm version, not from package.json. main's
      # version field may lag (its reconcile PR can sit unmerged), so anchoring to
      # npm guarantees the new version is strictly ahead of everything published.
      # A missing package (E404) is the only acceptable "no published version"
      # case; any OTHER `npm view` failure (network, auth, registry) is fatal so
      # we never silently fall back to a stale local version.
      - name: Compute and apply version bump
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          err="$(mktemp)"
          if published="$(npm view runnerize version 2>"$err")"; then
            echo "Anchoring bump to latest published npm version: $published"
            npm pkg set version="$published"
          elif grep -qiE 'E404|404 Not Found|is not in the npm registry' "$err"; then
            published=""
            echo "Package not yet published (E404); bumping from package.json version"
          else
            echo "::error::npm view failed unexpectedly (not an E404):"
            cat "$err"
            exit 1
          fi
          rm -f "$err"
          new="$(npm version "$BUMP" --no-git-tag-version)"
          new="${new#v}"
          tag="v$new"
          branch="release/$tag"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag"

      # Commit the bump on a throwaway branch and tag it, LOCALLY. Nothing is
      # pushed yet, and nothing here touches main. Stage package.json explicitly
      # (never `commit -am`) so no unrelated tracked change can ride along.
      - name: Commit and tag the release (local only)
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "release: $TAG"
          git tag -a "$TAG" -m "$TAG"

      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 bundles an older
      # npm. Pin to the 11.x line (which supports Node 20) rather than @latest so
      # a future npm major cannot silently break the publish. Done BEFORE publish
      # and before any push, to keep the pre-publish failure window small.
      - name: Ensure npm supports trusted publishing
        run: npm install -g "npm@^11.5.1"

      # Defense in depth (the concurrency lock already serializes releases):
      # re-query npm right before publishing and refuse unless the version we are
      # about to publish is STRICTLY newer than what is live, so we can never move
      # npm `latest` backward.
      - name: Guard against a non-forward publish
        env:
          NEW: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          latest_now="$(npm view runnerize version 2>/dev/null || echo '0.0.0')"
          highest="$(printf '%s\n%s\n' "$latest_now" "$NEW" | sort -V | tail -n1)"
          if [ "$NEW" = "$latest_now" ] || [ "$highest" != "$NEW" ]; then
            echo "::error::refusing to publish $NEW; not strictly ahead of live $latest_now"
            exit 1
          fi
          echo "OK: $NEW is strictly ahead of published $latest_now"

      # No NODE_AUTH_TOKEN: auth is the OIDC id-token exchanged with npm.
      # --provenance records a signed build attestation tying the package to this
      # workflow and commit. This is the point of no return; it runs before any
      # ref is pushed so a failure here leaves the repo untouched.
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

      # Publish succeeded — now push the tag and release branch. Both are outside
      # main's branch protection, so GITHUB_TOKEN suffices (no PAT, no bypass).
      - name: Push tag and release branch
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          git push origin "$TAG"
          git push origin "$BRANCH"

      # Auto-generated notes from merged PRs/commits since the previous tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: gh release create "$TAG" --verify-tag --generate-notes

      # Reconcile PR: brings main's package.json version up to the published one.
      # CI does not auto-run on this bot-authored PR; an admin merges it directly.
      - name: Open reconcile PR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: $TAG" \
            --body "Automated version bump to \`$TAG\`. Already published to npm (with provenance) and tagged, so releases are unaffected by when this merges — this PR only syncs main's \`package.json\` version. CI does not auto-run on bot-authored PRs; an admin can merge directly."
